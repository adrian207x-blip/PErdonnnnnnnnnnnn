<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perdón</title>
<style>
body{
    margin:0;
    padding:0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg,#89CFF0,#FFC0CB);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    background:rgba(255,255,255,0.95);
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 1.5s ease;
    position:relative;
}

h1{
    color:#4da6ff;
    font-size:3em;
    margin-bottom:10px;
    animation: pulse 2s infinite;
}

p{
    color:#555;
    font-size:1.2em;
}

img{
    width:250px;
    border-radius:15px;
    margin-top:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    animation: float 3s ease-in-out infinite;
}

.buttons{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:15px;
    position:relative;
}

button{
    padding:10px 20px;
    border:none;
    color:white;
    font-size:1em;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.yes{
    background: linear-gradient(45deg,#4da6ff,#ff85a2);
}

.no{
    background:#999;
    position:absolute;
}

button:hover{
    transform:scale(1.1);
}

/* Animaciones */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);} 
    to{opacity:1; transform:translateY(0);} 
}

@keyframes float{
    0%,100%{ transform:translateY(0);} 
    50%{ transform:translateY(-15px);} 
}

@keyframes pulse{
    0%,100%{ transform:scale(1);} 
    50%{ transform:scale(1.05);} 
}

</style>
</head>
<body>

<div class="container">
    <h1>Peldon</h1>
    <p>para q me perdones, quieres cafe y pan?</p>

    <!-- CAMBIA "gatito.jpg" POR TU IMAGEN -->
    <img src="gatito.jpg" alt="Gatito con flores pidiendo perdón">

    <p>¿Todo bien? perdon?</p>

    <div class="buttons">
        <button class="yes" onclick="alert('Gracias por escuchar jejeje 😊')">Sí</button>
        <button class="no" id="noBtn">No</button>
    </div>
</div>

<script>
const noBtn = document.getElementById('noBtn');

noBtn.addEventListener('mouseover', () => {
    const container = document.querySelector('.container');
    const maxX = container.clientWidth - noBtn.clientWidth;
    const maxY = container.clientHeight - noBtn.clientHeight;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.left = randomX + 'px';
    noBtn.style.top = randomY + 'px';
});
</script>

</body>
</html>
